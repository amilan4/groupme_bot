name: Daily GroupMe Bot

on:
  schedule:
    - cron: "0 15 * * *"   # runs daily
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python send_groupme.py
        env:
          GROUPME_BOT_ID: ${{ secrets.GROUPME_BOT_ID }}
